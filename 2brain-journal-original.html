<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2Brain Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00c896;
    --accent-dim: rgba(0,200,150,0.08);
    --text: #e8e8e8;
    --text-dim: #666;
    --text-mid: #999;
    --type-observation: #3b82f6;
    --type-task: #f59e0b;
    --type-idea: #a855f7;
    --type-reference: #6b7280;
    --type-person_note: #ec4899;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0 20px;
  }

  /* ---- Controls ---- */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box:focus {
    border-color: var(--accent);
  }

  .search-box::placeholder { color: var(--text-dim); }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .filter-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 2px;
  }

  .chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* ---- Stats bar ---- */
  .stats-bar {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* ---- Feed ---- */
  .feed { display: flex; flex-direction: column; gap: 8px; }

  .thought-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    transition: border-color 0.15s;
  }

  .thought-card:hover { border-color: #3a3a3a; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .type-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .badge-observation { background: rgba(59,130,246,0.12); color: var(--type-observation); }
  .badge-task        { background: rgba(245,158,11,0.12); color: var(--type-task); }
  .badge-idea        { background: rgba(168,85,247,0.12); color: var(--type-idea); }
  .badge-reference   { background: rgba(107,114,128,0.12); color: var(--type-reference); }
  .badge-person_note { background: rgba(236,72,153,0.12); color: var(--type-person_note); }
  .badge-meeting     { background: rgba(16,185,129,0.12); color: #10b981; }

  .card-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
    flex-shrink: 0;
  }

  .card-content {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 10px;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .meta-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .meta-pill.person { border-color: rgba(236,72,153,0.3); color: #ec4899; background: rgba(236,72,153,0.05); }
  .meta-pill.topic  { border-color: var(--border); color: var(--text-dim); }
  .meta-pill.action { border-color: rgba(245,158,11,0.3); color: var(--type-task); background: rgba(245,158,11,0.05); }

  .load-more {
    margin-top: 16px;
    text-align: center;
  }

  .load-more button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-mid);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .load-more button:hover { border-color: var(--accent); color: var(--accent); }

  .empty {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px 0;
  }

  .loading {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px 0;
  }
</style>
</head>
<body>

<header>
  <h1>2Brain</h1>
  <span class="subtitle">// journal</span>
</header>
<div class="divider"></div>

<div class="controls">
  <input class="search-box" id="search" placeholder="search thoughts..." oninput="applyFilters()">
  <div class="filter-row">
    <span class="filter-label">type</span>
    <span class="chip active" data-type="all" onclick="setType('all')">all</span>
    <span class="chip" data-type="observation" onclick="setType('observation')">observation</span>
    <span class="chip" data-type="task" onclick="setType('task')">task</span>
    <span class="chip" data-type="idea" onclick="setType('idea')">idea</span>
    <span class="chip" data-type="reference" onclick="setType('reference')">reference</span>
    <span class="chip" data-type="person_note" onclick="setType('person_note')">person note</span>
    <span class="chip" data-type="meeting" onclick="setType('meeting')">meeting</span>
  </div>
</div>

<div class="stats-bar" id="stats">loading...</div>
<div class="feed" id="feed"><div class="loading">fetching thoughts...</div></div>
<div class="load-more" id="load-more" style="display:none">
  <button onclick="loadMore()">load more</button>
</div>

<script>
  const SUPABASE_URL = 'https://wiabftxfumvzbttqgmtq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_y0N-mQ5ayjlQPAHqiVisGQ_dDwDB380';
  const PAGE_SIZE = 50;

  let allThoughts = [];
  let filtered = [];
  let displayed = 0;
  let activeType = 'all';

  async function fetchThoughts() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/thoughts?select=id,content,metadata,created_at&order=created_at.desc&limit=500`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return res.json();
  }

  function setType(type) {
    activeType = type;
    document.querySelectorAll('.chip[data-type]').forEach(c => {
      c.classList.toggle('active', c.dataset.type === type);
    });
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    filtered = allThoughts.filter(t => {
      const meta = t.metadata || {};
      if (activeType !== 'all' && meta.type !== activeType) return false;
      if (q) {
        const hay = [
          t.content,
          (meta.topics || []).join(' '),
          (meta.people || []).join(' '),
          (meta.action_items || []).join(' ')
        ].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    displayed = 0;
    renderFeed();
  }

  function renderFeed() {
    const feed = document.getElementById('feed');
    const stats = document.getElementById('stats');
    const loadMore = document.getElementById('load-more');

    const slice = filtered.slice(0, displayed + PAGE_SIZE);
    displayed = slice.length;

    stats.textContent = `${filtered.length} thought${filtered.length !== 1 ? 's' : ''}${activeType !== 'all' ? ` · ${activeType}` : ''} · ${allThoughts.length} total`;

    if (filtered.length === 0) {
      feed.innerHTML = '<div class="empty">no thoughts found</div>';
      loadMore.style.display = 'none';
      return;
    }

    feed.innerHTML = slice.map(t => renderCard(t)).join('');
    loadMore.style.display = displayed < filtered.length ? 'block' : 'none';
  }

  function loadMore() {
    const slice = filtered.slice(0, displayed + PAGE_SIZE);
    displayed = slice.length;
    document.getElementById('feed').innerHTML = slice.map(t => renderCard(t)).join('');
    document.getElementById('load-more').style.display = displayed < filtered.length ? 'block' : 'none';
  }

  function renderCard(t) {
    const meta = t.metadata || {};
    const type = meta.type || 'observation';
    const date = new Date(t.created_at);
    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

    const pills = [
      ...(meta.people || []).map(p => `<span class="meta-pill person">${esc(p)}</span>`),
      ...(meta.topics || []).map(t => `<span class="meta-pill topic">${esc(t)}</span>`),
      ...(meta.action_items || []).map(a => `<span class="meta-pill action">→ ${esc(a)}</span>`),
    ].join('');

    return `
    <div class="thought-card">
      <div class="card-header">
        <span class="type-badge badge-${type}">${type.replace('_', ' ')}</span>
        <span class="card-date">${dateStr} · ${timeStr}</span>
      </div>
      <div class="card-content">${esc(t.content)}</div>
      ${pills ? `<div class="card-meta">${pills}</div>` : ''}
    </div>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  fetchThoughts()
    .then(data => {
      allThoughts = data;
      applyFilters();
    })
    .catch(err => {
      document.getElementById('feed').innerHTML = `<div class="empty">error: ${err.message}</div>`;
      document.getElementById('stats').textContent = '';
    });
</script>
</body>
</html>
