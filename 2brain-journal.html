<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2Brain Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00c896;
    --accent-dim: rgba(0,200,150,0.06);
    --text: #e8e8e8;
    --text-dim: #666;
    --text-mid: #999;
    --type-observation: #3b82f6;
    --type-task: #f59e0b;
    --type-idea: #a855f7;
    --type-reference: #6b7280;
    --type-person_note: #ec4899;
    --type-summary: #06b6d4;
    --today: #f97316;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .subtitle { font-size: 12px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }

  .divider { height: 1px; background: var(--border); margin: 16px 0 20px; }

  .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

  .filter-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 2px;
  }

  .chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .stats-bar {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* Sections */
  .sections { display: flex; flex-direction: column; gap: 10px; }

  .section { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .section-header:hover { background: #232323; }

  .section-toggle { font-size: 10px; color: var(--text-dim); flex-shrink: 0; width: 10px; }

  .section-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .section-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .section-body { border-top: 1px solid var(--border); }

  /* Entries */
  .entry-item { border-bottom: 1px solid var(--border); }
  .entry-item:last-child { border-bottom: none; }

  .entry-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .entry-row:hover { background: #1b1b1b; }
  .entry-row.open { background: var(--accent-dim); border-left: 2px solid var(--accent); padding-left: 12px; }

  .entry-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 44px;
  }

  .type-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .badge-observation { background: rgba(59,130,246,0.12); color: var(--type-observation); }
  .badge-task        { background: rgba(245,158,11,0.12); color: var(--type-task); }
  .badge-idea        { background: rgba(168,85,247,0.12); color: var(--type-idea); }
  .badge-reference   { background: rgba(107,114,128,0.12); color: var(--type-reference); }
  .badge-person_note { background: rgba(236,72,153,0.12); color: var(--type-person_note); }
  .badge-meeting     { background: rgba(16,185,129,0.12); color: #10b981; }
  .badge-summary     { background: rgba(6,182,212,0.12);  color: var(--type-summary); }

  .entry-preview {
    font-size: 12px;
    color: var(--text-mid);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  /* Expanded detail */
  .entry-detail {
    display: none;
    padding: 10px 14px 14px 78px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .entry-content { margin-bottom: 10px; }

  .md-h2 { display: block; color: var(--accent); font-weight: 500; font-size: 12px; padding: 6px 0 2px; }
  .md-h3 { display: block; color: var(--text); font-weight: 500; font-size: 12px; padding: 4px 0 1px; }
  .md-p  { display: block; color: var(--text-mid); font-size: 12px; line-height: 1.6; min-height: 5px; }
  .md-li { display: block; color: var(--text-mid); font-size: 12px; line-height: 1.6; padding-left: 8px; }

  .detail-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

  .meta-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .meta-pill.person { border-color: rgba(236,72,153,0.3); color: #ec4899; background: rgba(236,72,153,0.05); }
  .meta-pill.action { border-color: rgba(245,158,11,0.3); color: var(--type-task); background: rgba(245,158,11,0.05); }

  .empty, .loading {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px 0;
  }

  /* Calendar */
  .cal-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .cal-nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    width: 28px;
    height: 28px;
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .cal-today-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 0 8px;
    height: 28px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .cal-today-btn:hover { border-color: var(--accent); color: var(--accent); }

  .cal-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text);
    letter-spacing: 0.5px;
    flex: 1;
    text-align: center;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 16px;
  }

  .cal-dow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
    padding: 4px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .cal-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.1s;
    min-height: 40px;
    gap: 3px;
  }
  .cal-day:hover { background: var(--surface2); border-color: var(--border); }
  .cal-day.empty { cursor: default; pointer-events: none; }

  .cal-day-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .cal-day.heat-1 { background: rgba(0,200,150,0.06); border-color: rgba(0,200,150,0.20); }
  .cal-day.heat-2 { background: rgba(0,200,150,0.12); border-color: rgba(0,200,150,0.35); }
  .cal-day.heat-3 { background: rgba(0,200,150,0.20); border-color: rgba(0,200,150,0.50); }
  .cal-day.heat-4 { background: rgba(0,200,150,0.30); border-color: rgba(0,200,150,0.70); }
  .cal-day[class*="heat-"] .cal-day-num { color: var(--text); }
  .cal-day.heat-4 .cal-day-num { color: var(--accent); }
  .cal-day.today { border-color: rgba(249,115,22,0.5); }
  .cal-day.today .cal-day-num { color: var(--today); font-weight: 500; }
  .cal-day.selected { background: rgba(249,115,22,0.10); border-color: var(--today); }
  .cal-day.selected .cal-day-num { color: var(--today); }

  .cal-dots {
    display: flex;
    gap: 2px;
    align-items: center;
    min-height: 6px;
  }

  .cal-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
  }
  .cal-dot.ref   { background: var(--type-task); }
  .cal-dot.event { background: #888; }

  .cal-events { border-bottom: 1px solid var(--border); }

  .cal-event {
    display: flex;
    gap: 10px;
    align-items: baseline;
    padding: 5px 14px;
    border-bottom: 1px solid var(--border);
  }
  .cal-event:last-child { border-bottom: none; }

  .cal-event-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 44px;
  }

  .cal-event-title {
    font-size: 12px;
    color: var(--text-mid);
  }

  /* Day panel */
  .cal-panel {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .cal-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .cal-panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .cal-panel-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .cal-panel-empty {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    padding: 24px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>2Brain</h1>
  <span class="subtitle">// journal</span>
</header>
<div class="divider"></div>

<div class="controls">
  <input class="search-box" id="search" placeholder="search thoughts..." oninput="applyFilters()">
  <div class="filter-row">
    <span class="filter-label">view</span>
    <span class="chip active" data-view="journal" onclick="setView('journal')">journal</span>
    <span class="chip" data-view="calendar" onclick="setView('calendar')">calendar</span>
  </div>
  <div class="filter-row" id="type-filters">
    <span class="filter-label">type</span>
    <span class="chip active" data-type="all" onclick="setType('all')">all</span>
    <span class="chip" data-type="observation" onclick="setType('observation')">observation</span>
    <span class="chip" data-type="task" onclick="setType('task')">task</span>
    <span class="chip" data-type="idea" onclick="setType('idea')">idea</span>
    <span class="chip" data-type="reference" onclick="setType('reference')">reference</span>
    <span class="chip" data-type="person_note" onclick="setType('person_note')">person note</span>
    <span class="chip" data-type="meeting" onclick="setType('meeting')">meeting</span>
    <span class="chip" data-type="summary" onclick="setType('summary')">summary</span>
  </div>
</div>

<div class="stats-bar" id="stats">loading...</div>
<div id="feed"><div class="loading">fetching thoughts...</div></div>

<script>
  const SUPABASE_URL = 'https://wiabftxfumvzbttqgmtq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_y0N-mQ5ayjlQPAHqiVisGQ_dDwDB380';

  const APP_ORDER = ['Delivery', 'SBS', 'CEF', 'Budget', '2Brain', 'General'];

  const APP_RULES = [
    {
      app: 'Delivery',
      topics: ['delivery', 'cloud run', 'firebase', 'firestore'],
      content: ['delivery app', 'cloud run', 'nuclear wipe', 'import screen', 'high count', 'high-count', 'scan_downloads'],
    },
    {
      app: 'SBS',
      topics: ['sbs', 'inventory management', 'retail operations', 'backstock', 'back-stock'],
      content: ['sbs', 'back-stock', 'backstock', 'pull log', 'shelf capacity', 'store back', '/sbs/'],
    },
    {
      app: 'CEF',
      topics: ['cef', 'investment', 'portfolio', 'nav', 'closed-end', 'distribution'],
      content: ['cef', 'closed-end', 'cef portfolio', 'nav sparkline', 'nav history', 'cef.db', '/cef/'],
    },
    {
      app: 'Budget',
      topics: ['budget', 'cash flow', 'quicken', 'sage', 'tax'],
      content: ['budget planner', 'cash flow', 'quicken', 'budget api', 'budget/api', 'sage green'],
    },
    {
      app: '2Brain',
      topics: ['knowledge management', 'second brain', 'open brain', 'memory system'],
      content: ['2brain', 'open brain', 'ingest-thought', 'brain-mcp', 'brain journal'],
    },
  ];

  let allThoughts = [];
  let filtered = [];
  let activeType = 'all';
  let viewMode = 'journal';
  let openSections = new Set(APP_ORDER);

  // Calendar state
  const _now = new Date();
  let calYear = _now.getFullYear();
  let calMonth = _now.getMonth();
  let selectedDate = null;
  // dateIndex: 'YYYY-MM-DD' -> { created: [ids], ref: [ids] }
  let dateIndex = {};
  // calEventIndex: 'YYYY-MM-DD' -> [{title, allDay, startTime}]
  let calEventIndex = {};
  let calEventsFetchedMonth = null;

  async function fetchThoughts() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/thoughts?select=id,content,metadata,created_at&order=created_at.desc&limit=500`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return res.json();
  }

  function buildDateIndex(thoughts) {
    dateIndex = {};
    for (const t of thoughts) {
      const created = t.created_at.substring(0, 10);
      if (!dateIndex[created]) dateIndex[created] = { created: [], ref: [] };
      dateIndex[created].created.push(t.id);

      // Scan content for referenced ISO dates
      const matches = t.content.match(/\b\d{4}-\d{2}-\d{2}\b/g) || [];
      for (const d of matches) {
        if (d === created) continue;
        if (!dateIndex[d]) dateIndex[d] = { created: [], ref: [] };
        if (!dateIndex[d].ref.includes(t.id)) dateIndex[d].ref.push(t.id);
      }
    }
  }

  function detectApp(t) {
    const meta = t.metadata || {};
    const topics = (meta.topics || []).join(' ').toLowerCase();
    const content = t.content.toLowerCase().substring(0, 400);
    for (const rule of APP_RULES) {
      if (rule.topics.some(k => topics.includes(k))) return rule.app;
      if (rule.content.some(k => content.includes(k))) return rule.app;
    }
    return 'General';
  }

  function groupByApp(thoughts) {
    const groups = {};
    APP_ORDER.forEach(a => groups[a] = []);
    for (const t of thoughts) groups[detectApp(t)].push(t);
    return groups;
  }

  function setView(mode) {
    viewMode = mode;
    document.querySelectorAll('.chip[data-view]').forEach(c => {
      c.classList.toggle('active', c.dataset.view === mode);
    });
    if (mode === 'calendar') fetchCalEvents();
    renderFeed();
  }

  function setType(type) {
    activeType = type;
    document.querySelectorAll('.chip[data-type]').forEach(c => {
      c.classList.toggle('active', c.dataset.type === type);
    });
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    filtered = allThoughts.filter(t => {
      const meta = t.metadata || {};
      if (activeType !== 'all' && meta.type !== activeType) return false;
      if (q) {
        const hay = [
          t.content,
          (meta.topics || []).join(' '),
          (meta.people || []).join(' '),
          (meta.action_items || []).join(' '),
        ].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    renderFeed();
  }

  function toggleSection(app) {
    const section = document.querySelector(`.section[data-section="${app}"]`);
    if (!section) return;
    const body = section.querySelector('.section-body');
    const toggle = section.querySelector('.section-toggle');
    if (openSections.has(app)) {
      openSections.delete(app);
      body.style.display = 'none';
      toggle.textContent = '▸';
    } else {
      openSections.add(app);
      body.style.display = '';
      toggle.textContent = '▾';
    }
  }

  function toggleEntry(id) {
    const item = document.querySelector(`.entry-item[data-id="${id}"]`);
    if (!item) return;
    const detail = item.querySelector('.entry-detail');
    const row = item.querySelector('.entry-row');
    const isOpen = detail.style.display === 'block';
    detail.style.display = isOpen ? 'none' : 'block';
    row.classList.toggle('open', !isOpen);
  }

  function previewText(content) {
    const lines = content.split('\n')
      .map(l => l.replace(/^#+\s*/, '').replace(/\*+/g, '').trim())
      .filter(l => l && !/^session summary/i.test(l));
    const first = lines[0] || content.trim();
    return first.length > 130 ? first.slice(0, 130) + '…' : first;
  }

  function renderMarkdown(raw) {
    return raw.split('\n').map(line => {
      const e = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      if (/^### /.test(line)) return `<div class="md-h3">${e.replace(/^### /, '')}</div>`;
      if (/^## /.test(line))  return `<div class="md-h2">${e.replace(/^## /, '')}</div>`;
      if (/^- /.test(line))   return `<div class="md-li">• ${e.replace(/^- /, '')}</div>`;
      return `<div class="md-p">${e.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>`;
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderEntry(t) {
    const meta = t.metadata || {};
    const type = meta.type || 'observation';
    const dateStr = new Date(t.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    const pills = [
      ...(meta.people || []).map(p => `<span class="meta-pill person">${esc(p)}</span>`),
      ...(meta.topics || []).map(tp => `<span class="meta-pill topic">${esc(tp)}</span>`),
      ...(meta.action_items || []).map(a => `<span class="meta-pill action">→ ${esc(a)}</span>`),
    ].join('');

    return `<div class="entry-item" data-id="${t.id}">
      <div class="entry-row" onclick="toggleEntry('${t.id}')">
        <span class="entry-date">${dateStr}</span>
        <span class="type-badge badge-${type}">${type.replace('_', ' ')}</span>
        <span class="entry-preview">${esc(previewText(t.content))}</span>
      </div>
      <div class="entry-detail">
        <div class="entry-content">${renderMarkdown(t.content)}</div>
        ${pills ? `<div class="detail-meta">${pills}</div>` : ''}
      </div>
    </div>`;
  }

  // ── Calendar ──────────────────────────────────────────────────────────────

  async function fetchCalEvents() {
    const yearMonth = `${calYear}-${String(calMonth + 1).padStart(2, '0')}`;
    if (calEventsFetchedMonth === yearMonth) return;
    try {
      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/ical-proxy?month=${yearMonth}`
      );
      const data = await res.json();
      calEventIndex = {};
      for (const ev of (data.events || [])) {
        // For all-day events, Apple iCal DTEND is exclusive — subtract 1 day
        let endDate = ev.endDate || ev.date;
        if (ev.allDay && endDate > ev.date) {
          const d = new Date(endDate + 'T12:00:00');
          d.setDate(d.getDate() - 1);
          endDate = d.toISOString().substring(0, 10);
        }
        const s = new Date(ev.date + 'T12:00:00');
        const e = new Date(endDate + 'T12:00:00');
        for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
          const ds = d.toISOString().substring(0, 10);
          if (!calEventIndex[ds]) calEventIndex[ds] = [];
          calEventIndex[ds].push(ev);
        }
      }
      calEventsFetchedMonth = yearMonth;
      renderCalendar();
    } catch (e) {
      console.error('iCal fetch failed', e);
    }
  }

  function goToToday() {
    const now = new Date();
    calYear  = now.getFullYear();
    calMonth = now.getMonth();
    selectedDate = now.toISOString().substring(0, 10);
    renderFeed();
  }

  function shiftMonth(delta) {
    calMonth += delta;
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0;  calYear++; }
    fetchCalEvents();
    renderFeed();
  }

  function selectDate(dateStr) {
    selectedDate = selectedDate === dateStr ? null : dateStr;
    renderFeed();
  }

  function renderCalendar() {
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    const todayStr    = new Date().toISOString().substring(0, 10);
    const firstDow   = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

    const dowCells = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');
    const empties  = Array(firstDow).fill('<div class="cal-day empty"></div>').join('');

    const dayCells = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${calYear}-${String(calMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry        = dateIndex[ds];
      const createdCount = entry?.created.length || 0;
      const hasCreated   = createdCount > 0;
      const hasRef       = entry?.ref.length > 0;
      const hasAny       = hasCreated || hasRef;

      const heatClass = createdCount >= 6 ? 'heat-4'
                      : createdCount >= 4 ? 'heat-3'
                      : createdCount >= 2 ? 'heat-2'
                      : createdCount >= 1 ? 'heat-1'
                      : '';

      const cls = [
        'cal-day',
        heatClass,
        ds === todayStr     ? 'today'    : '',
        ds === selectedDate ? 'selected' : '',
      ].filter(Boolean).join(' ');

      const hasEvents = (calEventIndex[ds]?.length || 0) > 0;
      const dots = (hasAny || hasEvents) ? `<div class="cal-dots">
        ${hasCreated ? '<div class="cal-dot"></div>'       : ''}
        ${hasRef     ? '<div class="cal-dot ref"></div>'   : ''}
        ${hasEvents  ? '<div class="cal-dot event"></div>' : ''}
      </div>` : '<div class="cal-dots"></div>';

      dayCells.push(`<div class="${cls}" onclick="selectDate('${ds}')">
        <span class="cal-day-num">${d}</span>
        ${dots}
      </div>`);
    }

    // Day panel
    let panel = '';
    if (selectedDate) {
      const entry = dateIndex[selectedDate] || { created: [], ref: [] };
      const allIds = new Set([...entry.created, ...entry.ref]);
      const dayThoughts = filtered.filter(t => allIds.has(t.id));

      const label = new Date(selectedDate + 'T12:00:00').toLocaleDateString('en-US',
        { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

      const dayEvents = calEventIndex[selectedDate] || [];
      const eventsHtml = dayEvents.length ? `<div class="cal-events">
        ${dayEvents.map(ev => `<div class="cal-event">
          <span class="cal-event-time">${ev.allDay ? 'all day' : (ev.startTime || '')}</span>
          <span class="cal-event-title">${esc(ev.title)}</span>
        </div>`).join('')}
      </div>` : '';

      const entries = dayThoughts.length
        ? dayThoughts.map(t => renderEntry(t)).join('')
        : '<div class="cal-panel-empty">no thoughts for this date</div>';

      panel = `<div class="cal-panel">
        <div class="cal-panel-header">
          <span class="cal-panel-title">${label}</span>
          ${dayThoughts.length ? `<span class="cal-panel-count">${dayThoughts.length} thought${dayThoughts.length !== 1 ? 's' : ''}</span>` : ''}
        </div>
        ${eventsHtml}
        ${entries}
      </div>`;
    }

    document.getElementById('feed').innerHTML = `
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="shiftMonth(-1)">‹</button>
        <span class="cal-title">${MONTHS[calMonth]} ${calYear}</span>
        <button class="cal-nav-btn" onclick="shiftMonth(1)">›</button>
        <button class="cal-today-btn" onclick="goToToday()">today</button>
      </div>
      <div class="cal-grid">${dowCells}${empties}${dayCells.join('')}</div>
      ${panel}
    `;
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function renderFeed() {
    const stats = document.getElementById('stats');
    stats.textContent = `${filtered.length} thought${filtered.length !== 1 ? 's' : ''} · ${allThoughts.length} total`;

    if (viewMode === 'calendar') {
      renderCalendar();
      return;
    }

    const feed = document.getElementById('feed');

    if (filtered.length === 0) {
      feed.innerHTML = '<div class="empty">no thoughts found</div>';
      return;
    }

    const groups = groupByApp(filtered);
    const parts = [];
    for (const app of APP_ORDER) {
      const thoughts = groups[app];
      if (!thoughts.length) continue;
      const isOpen = openSections.has(app);
      parts.push(`
        <div class="section" data-section="${app}">
          <div class="section-header" onclick="toggleSection('${app}')">
            <span class="section-toggle">${isOpen ? '▾' : '▸'}</span>
            <span class="section-name">${app}</span>
            <span class="section-count">${thoughts.length}</span>
          </div>
          <div class="section-body"${isOpen ? '' : ' style="display:none"'}>
            ${thoughts.map(t => renderEntry(t)).join('')}
          </div>
        </div>
      `);
    }
    feed.innerHTML = `<div class="sections">${parts.join('')}</div>`;
  }

  fetchThoughts()
    .then(data => {
      allThoughts = data;
      buildDateIndex(data);
      applyFilters();
    })
    .catch(err => {
      document.getElementById('feed').innerHTML = `<div class="empty">error: ${err.message}</div>`;
      document.getElementById('stats').textContent = '';
    });
</script>
</body>
</html>
